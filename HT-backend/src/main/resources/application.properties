spring.application.name=tracksy-api
server.port=8080
server.servlet.context-path=/api

# MySQL DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/habittracker?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=HabitTracker$ecretKey2024!MustBe256BitsLongForHS256Algorithm
app.jwt.expiration-ms=86400000

# CORS
spring.web.cors.allowed-origins=http://localhost:5173

# Mail Config (Dummy credentials for Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true 

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Google OAuth2 ──────────────────────────────────────────────────────────
# Go to https://console.cloud.google.com → APIs & Services → Credentials
# Create OAuth2 Client ID (Web application)
# Set Authorized Redirect URI to: http://localhost:8080/api/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/api/login/oauth2/code/google

